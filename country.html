<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Country Details</title>
<link rel="icon" type="image/png" href="images/favicon.png">

<style>
body{
    background:#111;
    color:white;
    padding:30px;
}

/* HERO */
.hero{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(255,255,255,0.08);
    padding:30px;
    border-radius:20px;
    margin-bottom:30px;
}

#flag{
    width:120px;
    margin-left: auto;
}

/* TEXT */
.country-info h1{
    font-size:50px;
}

.country-info p{
    font-size:22px;
    margin:10px 0;
}

/* HISTORY */
.history-box{
    background:rgba(255,255,255,0.08);
    padding:25px;
    border-radius:20px;
    margin-bottom:40px;
    font-size: 29.5px;
}

/* BANKNOTES + COINS */
#banknotes,
#coins{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
}

.note-card,
.coin-card{
    background:rgba(255,255,255,0.08);
    padding:15px;
    border-radius:10px;
    text-align:center;
    transition:0.3s;
    cursor: pointer;
}

.note-card:hover,
.coin-card:hover{
    transform:scale(1.05);
}

.note-card img{
    width:200px;
}

.coin-card img{
    width:120px;
}
#history{
    font-size:29px;
    line-height: 1.3;

}
</style>

</head>

<body>

<div class="hero">

    <div class="country-info">
        <h1 id="countryName"></h1>
        <p id="currency"></p>
        <p id="capital"></p>
        <p id="largestNote"></p>
    </div>

    <img id="flag">

</div>

<div class="history-box">
    <h2>History</h2>
    <p id="history"></p>
</div>

<h2>💴 Banknotes</h2>
<div id="banknotes"></div>

<h2>🪙 Coins</h2>
<div id="coins"></div>

<script src="country.js"></script>

</body>
</html>
